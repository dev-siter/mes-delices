<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mes Délices</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="top-bar">
  <div class="top-bar-inner">
    <div class="brand">
      <img src="logo.svg" alt="Mes Délices" class="brand-logo"/>
      <span class="brand-name">Mes Délis</span>
    </div>
    <button class="cart-btn" id="cartBtn" aria-label="Voir le panier">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<main>

  <section class="products-section" id="produits">
    <h1 class="section-title">Nos gourmandises</h1>
    <div class="products-grid" id="productsGrid"></div>
  </section>

  <section class="cart-section" id="panier">
    <h2 class="section-title">Mon panier</h2>
    <div id="cartEmpty" class="cart-empty">Votre panier est vide pour l'instant.</div>
    <div id="cartList" class="cart-list"></div>
    <div class="cart-total-row" id="cartTotalRow" style="display:none;">
      <span>Total</span>
      <strong id="cartTotal">0 FCFA</strong>
    </div>
    <button class="btn-primary" id="validateCartBtn" style="display:none;">Valider mon panier</button>
  </section>

  <section class="order-section" id="commande" style="display:none;">
    <h2 class="section-title">Finaliser ma commande</h2>

    <form id="orderForm" class="order-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="cmdNom">Nom <span>*</span></label>
          <input type="text" id="cmdNom" placeholder="Ex: Kouassi" required/>
        </div>
        <div class="form-group">
          <label for="cmdPrenoms">Prénoms <span>*</span></label>
          <input type="text" id="cmdPrenoms" placeholder="Ex: Aya Grace" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cmdEmail">Email <span>*</span></label>
          <input type="email" id="cmdEmail" placeholder="exemple@email.com" required/>
        </div>
        <div class="form-group">
          <label for="cmdTel">Téléphone <span>*</span></label>
          <input type="tel" id="cmdTel" placeholder="Ex: 0700000000" maxlength="10" inputmode="numeric" required oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"/>
        </div>
      </div>
      <div class="form-group">
        <label for="cmdAdresse">Adresse de livraison <span>*</span></label>
        <textarea id="cmdAdresse" rows="2" placeholder="Quartier, ville, indications..." required></textarea>
      </div>
      <div class="form-group">
        <label for="cmdDate">Date de livraison souhaitée</label>
        <input type="date" id="cmdDate"/>
      </div>

      <button type="submit" class="btn-primary">Confirmer ma commande</button>
    </form>

    <div id="orderConfirm" class="order-confirm" style="display:none;">
      <h3>Commande confirmée ✓</h3>
      <p>Merci <strong id="confirmClient"></strong>, votre commande a bien été enregistrée.</p>
      <p>Nous vous contactons au <strong id="confirmTel"></strong> pour organiser la livraison.</p>
    </div>

    <div id="orderToast" class="toast" style="display:none;"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
